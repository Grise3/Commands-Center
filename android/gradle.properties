# Project-wide Gradle settings.
# For more details on how to configure your build, see
# http://www.gradle.org/docs/current/userguide/build_settings.html
# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE *will override*
# any settings specified in this file.
# Enable AndroidX and Jetifier
android.useAndroidX=true
android.enableJetifier=true
# Kotlin code style for this project: "official" or "obsolete":
kotlin.code.style=official
# Enables copy-on-write strategy for dependency resolution.
# This can improve performance on machines with slow I/O.
org.gradle.vfs.watch=true
# Increase the daemon's memory to avoid issues during build.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
